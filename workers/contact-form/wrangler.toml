name = "contact-form"
main = "index.ts"
compatibility_date = "2026-04-30"

# Production environment binds to api.frame.dev/contact via a Cloudflare
# route (configured below). The Worker itself stays at the default
# `contact-form.<account>.workers.dev` URL.

[vars]
ALLOWED_ORIGIN = "https://agentos.sh"
FROM_ADDRESS = "AgentOS Contact <noreply@frame.dev>"
TO_ADDRESS = "team@frame.dev"

# Bind a custom route. After deploy, this maps:
#   https://contact.frame.dev/contact -> this Worker
# The frame.dev zone needs a DNS record for `contact` (proxied / orange cloud).
# Comment this out if you'd rather use the default workers.dev URL while testing.
#
# [[routes]]
# pattern = "contact.frame.dev/contact"
# zone_name = "frame.dev"

# Secret values are NOT in this file. Set them with:
#   wrangler secret put RESEND_API_KEY
# from inside this directory.
