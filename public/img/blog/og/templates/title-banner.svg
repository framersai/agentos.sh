<?xml version="1.0" encoding="UTF-8"?>
<!--
  AgentOS Blog OG: Title Banner Template
  =======================================

  For posts without a single headline metric (case studies, framework
  comparisons, conceptual pieces, announcements). Title is the visual
  focal point. Same brand chrome as stat-banner.svg so the cards are
  visually cohesive across the catalog.

  Substitution variables:

    {{TITLE_LINE_1}}    line 1 of the post title
    {{TITLE_LINE_2}}    line 2 (optional, empty string if title fits)
    {{TITLE_LINE_3}}    line 3 (optional)
    {{EXCERPT}}         short excerpt / dek line (one line)
    {{CATEGORY}}        e.g. "Engineering" (upper-cased)
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="brandGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="hsl(180, 95%, 60%)" />
      <stop offset="100%" stop-color="hsl(270, 85%, 65%)" />
    </linearGradient>
    <linearGradient id="brandGradientVert" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="hsl(180, 95%, 60%)" />
      <stop offset="100%" stop-color="hsl(270, 85%, 65%)" />
    </linearGradient>

    <radialGradient id="bgRadial" cx="0.92" cy="0.08" r="0.7">
      <stop offset="0%" stop-color="hsla(180, 95%, 60%, 0.15)" />
      <stop offset="50%" stop-color="hsla(270, 60%, 30%, 0.05)" />
      <stop offset="100%" stop-color="hsla(220, 30%, 8%, 0)" />
    </radialGradient>
    <radialGradient id="bgRadialBL" cx="0.05" cy="0.95" r="0.6">
      <stop offset="0%" stop-color="hsla(270, 85%, 65%, 0.10)" />
      <stop offset="100%" stop-color="hsla(220, 30%, 8%, 0)" />
    </radialGradient>

    <pattern id="hexGrid" x="0" y="0" width="60" height="52" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 60 17 L 60 35 L 30 52 L 0 35 L 0 17 Z"
            fill="none" stroke="hsl(180, 95%, 60%)"
            stroke-width="0.6" stroke-opacity="0.07" />
    </pattern>

    <filter id="textGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="2" />
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Decorative geometric motif: nested layered rectangles + diagonal stroke
         (suggests architectural layering, "OS" stack, framework structure). -->
    <g id="layeredMotif">
      <rect x="0" y="0" width="120" height="80" fill="none"
            stroke="hsl(180, 95%, 60%)" stroke-width="0.8" stroke-opacity="0.5" />
      <rect x="-12" y="12" width="120" height="80" fill="none"
            stroke="hsl(180, 95%, 60%)" stroke-width="0.8" stroke-opacity="0.35" />
      <rect x="-24" y="24" width="120" height="80" fill="none"
            stroke="hsl(270, 85%, 65%)" stroke-width="0.8" stroke-opacity="0.25" />
      <line x1="-30" y1="110" x2="120" y2="-15" stroke="url(#brandGradient)" stroke-width="1" stroke-opacity="0.4" />
    </g>
  </defs>

  <!-- Background layers -->
  <rect width="1200" height="630" fill="hsl(220, 30%, 8%)" />
  <rect width="1200" height="630" fill="url(#bgRadial)" />
  <rect width="1200" height="630" fill="url(#bgRadialBL)" />
  <rect width="1200" height="630" fill="url(#hexGrid)" />

  <!-- Frame chrome -->
  <rect x="58" y="200" width="3" height="260" fill="url(#brandGradientVert)" rx="1.5" />

  <path d="M 30 90 L 30 30 L 90 30" fill="none"
        stroke="url(#brandGradient)" stroke-width="2.5" stroke-linecap="square" stroke-opacity="0.85" />
  <path d="M 1110 30 L 1170 30 L 1170 90" fill="none"
        stroke="url(#brandGradient)" stroke-width="2.5" stroke-linecap="square" stroke-opacity="0.85" />
  <path d="M 30 540 L 30 600 L 90 600" fill="none"
        stroke="url(#brandGradient)" stroke-width="2.5" stroke-linecap="square" stroke-opacity="0.65" />
  <path d="M 1170 540 L 1170 600 L 1110 600" fill="none"
        stroke="url(#brandGradient)" stroke-width="2.5" stroke-linecap="square" stroke-opacity="0.65" />

  <rect x="0" y="624" width="1200" height="6" fill="url(#brandGradient)" />

  <!-- Decorative layered motif on the right -->
  <g transform="translate(990, 230)">
    <use href="#layeredMotif" />
  </g>

  <!-- Brand mark -->
  <g transform="translate(60, 70)">
    <path d="M 0 28 L 14 0 L 28 28 Z"
          fill="none" stroke="url(#brandGradient)" stroke-width="2.5" stroke-linejoin="round" />
    <path d="M 6 22 L 22 22"
          stroke="url(#brandGradient)" stroke-width="2.5" stroke-linecap="round" />
    <text x="44" y="22" font-family="Inter, -apple-system, BlinkMacSystemFont, system-ui, sans-serif"
          font-size="26" font-weight="700" fill="hsl(200, 70%, 94%)" letter-spacing="-0.5">
      AgentOS
    </text>
  </g>
  <text x="60" y="120" font-family="Inter, -apple-system, BlinkMacSystemFont, system-ui, sans-serif"
        font-size="11" font-weight="600" fill="hsl(180, 95%, 60%)" letter-spacing="3" fill-opacity="0.85">
    OPEN-SOURCE TYPESCRIPT AI AGENT RUNTIME
  </text>

  <!-- Category badge top-right -->
  <g transform="translate(990, 60)">
    <rect x="0" y="0" width="170" height="32" rx="16"
          fill="hsla(180, 95%, 60%, 0.08)"
          stroke="hsl(180, 95%, 60%)" stroke-width="1" stroke-opacity="0.55" />
    <text x="85" y="21" font-family="Inter, -apple-system, BlinkMacSystemFont, system-ui, sans-serif"
          font-size="11" font-weight="700" fill="hsl(180, 95%, 60%)" letter-spacing="3" text-anchor="middle">
      {{CATEGORY}}
    </text>
  </g>

  <!-- Title block (up to 3 lines, big) -->
  <text x="80" y="240"
        font-family="Inter, -apple-system, BlinkMacSystemFont, system-ui, sans-serif"
        font-size="56" font-weight="700" fill="hsl(200, 70%, 94%)" letter-spacing="-1.5"
        filter="url(#textGlow)">
    <tspan x="80" dy="0">{{TITLE_LINE_1}}</tspan>
    <tspan x="80" dy="68">{{TITLE_LINE_2}}</tspan>
    <tspan x="80" dy="68">{{TITLE_LINE_3}}</tspan>
  </text>

  <!-- Excerpt / dek (small, secondary text below the title) -->
  <text x="80" y="490"
        font-family="Inter, -apple-system, BlinkMacSystemFont, system-ui, sans-serif"
        font-size="20" font-weight="400" fill="hsl(200, 50%, 80%)" letter-spacing="-0.2">
    <tspan x="80" dy="0">{{EXCERPT_LINE_1}}</tspan>
    <tspan x="80" dy="28">{{EXCERPT_LINE_2}}</tspan>
  </text>

  <!-- Footer URL -->
  <text x="60" y="595"
        font-family="Inter, -apple-system, BlinkMacSystemFont, system-ui, sans-serif"
        font-size="14" font-weight="500" fill="hsl(180, 95%, 60%)" letter-spacing="1.5" fill-opacity="0.8">
    agentos.sh/blog
  </text>

  <!-- Right footer accent dots -->
  <circle cx="1100" cy="591" r="3" fill="hsl(180, 95%, 60%)" fill-opacity="0.55" />
  <circle cx="1115" cy="591" r="3" fill="hsl(180, 95%, 60%)" fill-opacity="0.7" />
  <circle cx="1130" cy="591" r="3" fill="hsl(270, 85%, 65%)" fill-opacity="0.85" />
</svg>
